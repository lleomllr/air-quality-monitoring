services:
  frontend:
    container_name: frontend
    build:
      context: .
      dockerfile: Dockerfile
    image: frontend
    ports:
      - "5173:5173"
    working_dir: /app
    command: sh -c "npm install; npm run dev -- --host 0.0.0.0"
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - backend-network