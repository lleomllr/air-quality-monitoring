# Application
spring.application.name=airnow-client-app
server.port=8085

# Tomcat
server.tomcat.connection-timeout=60000
server.tomcat.keep-alive-timeout=60000
server.tomcat.max-keep-alive-requests=100

# Client Database (PostgreSQL)
spring.datasource.clients.jdbc-url=jdbc:postgresql://postgres:5432/clients
spring.datasource.clients.username=admin
spring.datasource.clients.password=admin
spring.datasource.clients.driver-class-name=org.postgresql.Driver

# Timescale Database
spring.datasource.timescale.jdbc-url=jdbc:postgresql://timescaledb:5432/db_airquality
spring.datasource.timescale.username=admin
spring.datasource.timescale.password=admin
spring.datasource.timescale.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Disable cache
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# Allow bean overriding
spring.main.allow-bean-definition-overriding=true

# JWT
jwt.secret=VotreCleSuperSecreteQuiDoitEtreLongueEtComplexe123456789
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:5173

# Logging
logging.level.com.example.demo=INFO
logging.level.org.hibernate.SQL=WARN

# Kafka TopK (global-top10-aqi-events-v2)
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=backend-topk-consumer-group
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
spring.kafka.properties.schema.registry.url=http://schema-registry:8081
spring.kafka.properties.specific.avro.reader=false
spring.kafka.listener.missing-topics-fatal=false

app.topk.topic=global-top10-aqi-events-v2